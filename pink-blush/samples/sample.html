<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pink Blush Theme Preview</title>
  <style>
    :root {
      --primary: #D4567A;
      --bg: #FFF5F7;
      --text: #4A3040;
      --accent: #C54B8C;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }

    h1 {
      font-size: 2.5rem;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .card {
      background: white;
      border: 1px solid #F0C0D0;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      box-shadow: 0 2px 8px rgba(212, 86, 122, 0.1);
    }

    .btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      transition: background-color 0.2s;
    }

    .btn:hover {
      background-color: #C04868;
    }

    .tag {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      background: #FAE8ED;
      color: var(--accent);
      border-radius: 999px;
      font-size: 0.85rem;
      margin-right: 0.5rem;
    }

    /* Grid layout */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1rem;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.75rem; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Pink Blush &hearts;</h1>
    <p>A soft pastel theme for Visual Studio Code.</p>

    <div class="grid">
      <div class="card">
        <h2>Features</h2>
        <ul>
          <li>Dracula-inspired syntax colors</li>
          <li>Soft pink UI chrome</li>
          <li>Bold keywords &amp; functions</li>
        </ul>
      </div>
      <div class="card">
        <h2>Tags</h2>
        <span class="tag">theme</span>
        <span class="tag">pastel</span>
        <span class="tag">pink</span>
        <span class="tag">light</span>
      </div>
    </div>

    <button class="btn" onclick="alert('Hello from Pink Blush!')">
      Try It Out
    </button>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const cards = document.querySelectorAll(".card");
      cards.forEach((card, index) => {
        card.style.animationDelay = `${index * 0.15}s`;
      });
    });
  </script>
</body>
</html>
